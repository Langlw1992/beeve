services:
  postgres:
    image: postgres:17-alpine
    container_name: beeve-postgres
    environment:
      POSTGRES_USER: beeve
      POSTGRES_PASSWORD: beeve_secret
      POSTGRES_DB: beeve_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeve -d beeve_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: